# panda_common.cfg — PanDA common logging configuration for docker-compose dev stack

[logger]

logdir = /var/log/panda
loggername = prod
log_level = INFO
nemitters = 1
migrated = True

# Remote log shipping disabled in dev stack — point at localhost as a no-op
loghost = localhost
monport-apache = 80
method = GET
encoding = url
monurlprefix = /logger/logger/query

# Log rotation disabled
rotating_policy = none
rotating_backup_count = 1
rotating_max_size = 1024
rotating_interval = 24
